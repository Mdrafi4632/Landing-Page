    :root {

      --line: #e5e1d8;
      --accent: #b45309; /* warm amber - sophisticated, used sparingly */

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Geist', system-ui, -apple-system, sans-serif;
      background-color: var(--paper);
      background-image:
        linear-gradient(to right, rgba(11,15,21,0.018) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(11,15,21,0.018) 1px, transparent 1px);
      background-size: 48px 48px;
      color: var(--ink);
    }
    .font-display { font-family: 'Fraunces', Georgia, serif; font-optical-sizing: auto; letter-spacing: -0.02em; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    .accent { color: var(--accent); }
    .border-line { border-color: var(--line); }
    .bg-paper { background: var(--paper); }
    .bg-ink { background: var(--ink); }
    .text-ink { color: var(--ink); }
    .text-paper { color: var(--paper); }
    .text-muted { color: var(--muted); }
    .border-ink { border-color: var(--ink); }
    .hover\:bg-ink:hover { background: var(--ink); }
    .hover\:text-paper:hover { color: var(--paper); }
    .hover\:accent:hover { color: var(--accent); }
    .hover\:border-ink:hover { border-color: var(--ink); }
    .bg-paper\/85 { background: rgba(248,247,244,0.85); }
    .fade-up { animation: fadeUp 0.8s ease-out both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .underline-link {
      background-image: linear-gradient(currentColor, currentColor);
      background-size: 0% 1px;
      background-repeat: no-repeat;
      background-position: 0 100%;
      transition: background-size 0.35s ease;
    }
    .underline-link:hover { background-size: 100% 1px; }

    /* Navbar hover effect — animated underline + amber color */
    .nav-link {
      position: relative;
      padding-bottom: 4px;
      transition: color 0.25s ease;
    }
    .nav-link::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 1.5px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left center;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .nav-link:hover { color: var(--accent); }
    .nav-link:hover::after { transform: scaleX(1); }

    /* --- Hero effects --- */

    /* Pulsing live status dot */
    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
      flex-shrink: 0;
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%   { box-shadow: 0 0 0 0 rgba(180, 83, 9, 0.55); }
      70%  { box-shadow: 0 0 0 10px rgba(180, 83, 9, 0); }
      100% { box-shadow: 0 0 0 0 rgba(180, 83, 9, 0); }
    }

    /* Hide text caret on focused sections (from anchor-link scrolling) */
    section, section:focus, h1, h2, h3, h4 {
      caret-color: transparent;
      outline: none;
    }

    /* Blinking typewriter cursor */
    .type-cursor {
      display: inline-block;
      width: 0.06em;
      height: 0.78em;
      background: var(--accent);
      margin-left: 0.12em;
      vertical-align: baseline;
      animation: blink 1.05s steps(2) infinite;
    }
    @keyframes blink {
      0%, 49%   { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    /* Staggered word reveal */
    .stagger-word {
      display: inline-block;
      opacity: 0;
      transform: translateY(14px);
      animation: staggerIn 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes staggerIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Buttons: text shifts left + arrow slides in from right */
    .btn-fill {
      display: inline-flex;
      align-items: center;
      transition: border-color 0.35s ease, color 0.35s ease;
    }
    .btn-fill .btn-label {
      display: inline-block;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn-fill:hover { color: var(--accent); border-color: var(--accent); }
    .btn-fill:hover .btn-label { transform: translateX(-4px); }

    .btn-fill .btn-arrow {
      display: inline-block;
      width: 0;
      margin-left: 0;
      opacity: 0;
      overflow: hidden;
      transform: translateX(-4px);
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity 0.4s ease,
                  margin-left 0.4s ease,
                  transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn-fill:hover .btn-arrow {
      width: 1em;
      margin-left: 0.45em;
      opacity: 1;
      transform: translateX(0);
    }

    /* Stats — staggered fade in + hover lift + underline */
    .stat-item {
      position: relative;
      opacity: 0;
      animation: fadeUpStat 0.75s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      padding-bottom: 14px;
      cursor: default;
    }
    @keyframes fadeUpStat {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .stat-value {
      display: inline-block;
      transition: color 0.3s ease, transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .stat-item:hover .stat-value {
      color: var(--accent);
      transform: translateY(-3px);
    }
    .stat-item::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      height: 1.5px;
      width: 0;
      background: var(--accent);
      transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .stat-item:hover::after { width: 32px; }

    /* Education — hover slide + scroll reveal */
    .edu-period {
      transition: color 0.35s ease, transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .edu-title {
      transition: color 0.35s ease;
    }
    @media (min-width: 768px) {
      .edu-entry:hover .edu-period {
        color: var(--accent);
        transform: translateX(6px);
      }
      .edu-entry:hover .edu-title {
        color: var(--accent);
      }
    }

    /* Project modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(11, 15, 21, 0.5);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.25s ease-out;
    }
    .modal-content {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 40px;
      max-width: 620px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      position: relative;
      animation: modalIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(24px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 22px;
      line-height: 1;
      color: var(--muted);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .modal-close:hover {
      background: var(--line);
      color: var(--ink);
    }

    .reveal-on-scroll {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.75s cubic-bezier(0.4, 0, 0.2, 1),

    .reveal-on-scroll.in-view {
      opacity: 1;
      transform: translateY(0);
    }

    .collab-badge {

      height: 28px;

      letter-spacing: 0.5px;

      border-color: var(--accent);
      transform: scale(1.08);
    }
    .collab-badge:hover .collab-initials {
      color: var(--accent);
    }
    .collab-tooltip {
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) translateY(-4px);
      white-space: nowrap;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      font-style: italic;
      color: var(--muted);
      background: var(--paper);
      border: 1px solid var(--line);
      border-left: 2px solid var(--accent);
      border-radius: 4px;
      padding: 5px 10px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 15;
      box-shadow: 0 4px 12px rgba(11, 15, 21, 0.06);
    }
    .collab-badge:hover .collab-tooltip {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Stats — slide + amber on hover */
    .stat-item {
      cursor: default;
    }
    .stat-value, .stat-label {
      transition: color 0.35s ease, transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);

    .stat-item:hover .stat-value,
    .stat-item:hover .stat-label {
      color: var(--accent);
      transform: translateX(6px);

    /* Skills — hover-to-reveal context tooltip */
    .skill-item {
      position: relative;
      display: inline-block;
      cursor: default;
      padding-right: 8px;
      z-index: 1;

    .skill-item:hover {

    }
    .skill-name {
      display: inline-block;
      transition: color 0.25s ease, transform 0.3s ease;
    }
    .skill-item:hover .skill-name {
      color: var(--accent);
      transform: translateX(3px);
    }
    .skill-context {
      position: absolute;
      left: 0;
      top: calc(100% + 6px);
      max-width: 260px;
      width: max-content;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      line-height: 1.5;
      letter-spacing: 0.01em;
      color: var(--muted);
      font-style: italic;
      background: var(--paper);
      border: 1px solid var(--line);
      border-left: 2px solid var(--accent);
      border-radius: 4px;
      padding: 6px 10px;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
      z-index: 200;
      box-shadow: 0 6px 20px rgba(11, 15, 21, 0.06);
    }
    .skill-item:hover .skill-context {
      opacity: 1;
      transform: translateY(0);
    }

        linear-gradient(to bottom, rgba(11,15,21,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }
  </style>

    function App() {
      useEffect(() => {
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add("in-view");
                observer.unobserve(entry.target);
              }
            });
          },
          { threshold: 0.12, rootMargin: "0px 0px -40px 0px" }
        );
        document.querySelectorAll(".reveal-on-scroll").forEach((el) => observer.observe(el));
        return () => observer.disconnect();
      }, []);


      return (
        <>
          <Navbar />
          <main>
            <Hero />
            <About />
            <Work />
            <Skills />
            <Experience />
            <Contact />
          </main>
          <Footer />
        </>
      );
    }
    // Note: Education is rendered inside the Experience component file structure above.

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
